AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Decomp Academy API. A fully serverless stack behind the custom domain: the
  MWCC GC/2.0 compile service (x86_64 Lambda running wibo) and the auth + user-data
  API (Cognito, HTTP API, Lambda, DynamoDB), all on one HTTP API. The frontend
  reaches the compiler via the original flat routes and the versioned
  /compile/mwcc/{version}/{action} routes.

Parameters:
  DomainName:
    Type: String
    Default: api.decomp-academy.dev
    Description: Custom domain for the HTTP API.
  CertificateArn:
    Type: String
    Description: >
      ACM cert ARN for DomainName (created + DNS-validated manually, regional
      eu-west-1). Supplied at deploy time via the CERTIFICATE_ARN secret — not
      committed, since the ARN embeds the AWS account id.
  HostedZoneId:
    Type: String
    Description: >
      Route53 hosted zone id for decomp-academy.dev (SAM adds the alias record).
      Supplied at deploy time via the HOSTED_ZONE_ID secret — not committed.
  AllowedOrigins:
    Type: CommaDelimitedList
    Default: https://decomp-academy.dev,http://localhost:3000
    Description: Origins permitted by the HTTP API CORS config.
  FromEmail:
    Type: String
    Default: noreply@decomp-academy.dev
    Description: From address for transactional email (must be on a Resend-verified domain).
  ResendApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Resend API key (re_…). Required for transactional email — if empty, the custom email sender errors (sign-up / password reset fail).
  FeedbackNotifyEmail:
    Type: String
    Default: ""
    Description: >
      Where learner feedback notifications are emailed (via Resend). Supplied at
      deploy time via the FEEDBACK_NOTIFY_EMAIL secret — not committed. Empty
      disables the email.

Globals:
  Function:
    Timeout: 10
    MemorySize: 256
    # Runtime + Architectures are per-function, not here: list props merge
    # additively in Globals rather than override. All Rust on provided.al2023,
    # static musl via each function's Makefile.

Resources:
  # ─── Auth + user-data API (serverless) ─────────────────────────────────────

  # KMS key Cognito uses to encrypt verification codes for the email-sender Lambda
  # (which decrypts them via the AWS Encryption SDK).
  CognitoEmailSenderKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: Encrypts Cognito verification codes for the Custom Email Sender Lambda.
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowAccountAdmin
            Effect: Allow
            Principal: { AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root" }
            Action: kms:*
            Resource: "*"
          - Sid: AllowCognitoEncrypt
            Effect: Allow
            Principal: { Service: cognito-idp.amazonaws.com }
            Action: [kms:Encrypt, kms:GenerateDataKey*, kms:CreateGrant, kms:DescribeKey]
            Resource: "*"

  CognitoEmailSenderFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: api/
      Handler: bootstrap
      Runtime: provided.al2023
      Architectures:
        - arm64
      Timeout: 15
      MemorySize: 512
      Environment:
        Variables:
          KMS_KEY_ARN: !GetAtt CognitoEmailSenderKey.Arn
          FROM_EMAIL: !Ref FromEmail
          FROM_NAME: Decomp Academy
          RESEND_API_KEY: !Ref ResendApiKey
      Policies:
        - Statement:
            - Effect: Allow
              Action: kms:Decrypt
              Resource: !GetAtt CognitoEmailSenderKey.Arn

  CognitoEmailSenderInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt CognitoEmailSenderFunction.Arn
      Principal: cognito-idp.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

  UserPool:
    Type: AWS::Cognito::UserPool
    # Losing this means losing every account — never replace, never delete.
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    DependsOn: CognitoEmailSenderInvokePermission
    Properties:
      UserPoolName: !Sub "${AWS::StackName}-users"
      LambdaConfig:
        KMSKeyID: !GetAtt CognitoEmailSenderKey.Arn
        CustomEmailSender:
          LambdaArn: !GetAtt CognitoEmailSenderFunction.Arn
          LambdaVersion: V1_0
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireUppercase: true
          RequireSymbols: false
      Schema:
        - { Name: email, AttributeDataType: String, Required: true, Mutable: false }
        - { Name: name, AttributeDataType: String, Required: false, Mutable: true }
      AccountRecoverySetting:
        RecoveryMechanisms:
          - { Name: verified_email, Priority: 1 }
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: !Sub "${AWS::StackName}-web"
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      AccessTokenValidity: 60
      IdTokenValidity: 60
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
      ReadAttributes: [email, email_verified, name]
      WriteAttributes: [email, name]

  DataTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "${AWS::StackName}-data"
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: true
      AttributeDefinitions:
        - { AttributeName: PK, AttributeType: S }
        - { AttributeName: SK, AttributeType: S }
      KeySchema:
        - { AttributeName: PK, KeyType: HASH }
        - { AttributeName: SK, KeyType: RANGE }
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Domain:
        DomainName: !Ref DomainName
        CertificateArn: !Ref CertificateArn
        Route53:
          HostedZoneId: !Ref HostedZoneId
      CorsConfiguration:
        AllowOrigins: !Ref AllowedOrigins
        AllowHeaders: [authorization, content-type]
        AllowMethods: [GET, PUT, POST, DELETE, OPTIONS]
      # Throttle the public, unauthenticated write routes (route throttling is
      # global, not per-IP, so values have headroom over real concurrent use).
      RouteSettings:
        # /feedback writes a row + emails the owner — throttle to bound spam.
        "POST /feedback":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 3
        # /compile is the public playground compile (no lesson gate); throttle to
        # bound compile-Lambda cost/abuse. The flat route + every version's
        # versioned playground route (one per Lambda) get the same limits; the
        # per-version entries mirror compiler/compilers.list (one per Lambda).
        "POST /compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "POST /compile/mwcc/247_92/compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "POST /compile/mwcc/233_144/compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "POST /compile/mwcc/233_159/compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "POST /compile/mwcc/233_159p1/compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "POST /compile/mwcc/233_163/compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "POST /compile/mwcc/233_163n/compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "POST /compile/mwcc/242_53/compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "POST /compile/mwcc/242_81/compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "POST /compile/mwcc/242_81r/compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "POST /compile/mwcc/247_92p1/compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "POST /compile/mwcc/247_105/compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "POST /compile/mwcc/247_107/compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "POST /compile/mwcc/247_108/compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "POST /compile/mwcc/41_51213/compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "POST /compile/mwcc/41_60126/compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "POST /compile/mwcc/41_60209/compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "POST /compile/mwcc/41_60831/compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "POST /compile/mwcc/42_127/compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "POST /compile/mwcc/42_140/compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "POST /compile/mwcc/42_142/compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "POST /compile/mwcc/42_60308/compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "POST /compile/mwcc/42_60422/compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "POST /compile/mwcc/43_145/compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "POST /compile/mwcc/43_151/compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "POST /compile/mwcc/43_172/compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "POST /compile/mwcc/43_188/compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "POST /compile/mwcc/43_202/compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "POST /compile/mwcc/43_213/compile":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        # /stats/{lessonId} is public so anonymous learners' compiles still count;
        # throttle + the UUID lessonId check (handler) bound table growth/cost.
        "POST /stats/{lessonId}":
          ThrottlingBurstLimit: 20
          ThrottlingRateLimit: 10
      Auth:
        DefaultAuthorizer: CognitoJwt
        Authorizers:
          CognitoJwt:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
              audience: [!Ref UserPoolClient]

  ApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: api/
      Handler: bootstrap
      Runtime: provided.al2023
      Architectures:
        - arm64
      Environment:
        Variables:
          TABLE_NAME: !Ref DataTable
          # Feedback notifications reuse the same Resend setup as the email sender.
          FROM_EMAIL: !Ref FromEmail
          FROM_NAME: Decomp Academy
          RESEND_API_KEY: !Ref ResendApiKey
          FEEDBACK_NOTIFY_EMAIL: !Ref FeedbackNotifyEmail
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DataTable
      Events:
        Me:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /me
            Method: GET
        GetProgress:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /progress
            Method: GET
        GetStats:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /stats
            Method: GET
        RecordCompile:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /stats/{lessonId}
            Method: POST
            # Anonymous learners compile too, so this counter is unauthenticated.
            Auth: { Authorizer: NONE }
        PutProgress:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /progress/{lessonId}
            Method: PUT
        SubmitFeedback:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /feedback
            Method: POST
            # Anonymous learners submit feedback too, so this is unauthenticated.
            Auth: { Authorizer: NONE }
        GetFeedback:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /feedback
            Method: GET
        DeleteFeedback:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /feedback/{id}
            Method: DELETE

  # ─── Compile service on Lambda (x86_64) ────────────────────────────────────
  # Rust on provided.al2023 (static musl; see compiler/Makefile). The toolchain
  # ships in the package and runs in place from $LAMBDA_TASK_ROOT. Public
  # (Authorizer: NONE). x86_64 because the MWCC toolchain is 32-bit x86.
  #
  # ── Egress-isolated network for the compile sandbox ─────────────────────────
  # Dedicated VPC, private subnets, no internet/NAT route: the compiler runs
  # untrusted code, so it can't connect out even if exploited. No NAT or VPC
  # endpoints needed (the function makes no AWS API calls).
  CompileVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.210.0.0/16
      Tags:
        - { Key: Name, Value: !Sub "${AWS::StackName}-compile-vpc" }

  CompileSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref CompileVpc
      CidrBlock: 10.210.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]

  CompileSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref CompileVpc
      CidrBlock: 10.210.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]

  # Route table with only the implicit local route — no 0.0.0.0/0, so no egress.
  CompilePrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref CompileVpc

  CompileSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref CompileSubnetA
      RouteTableId: !Ref CompilePrivateRouteTable

  CompileSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref CompileSubnetB
      RouteTableId: !Ref CompilePrivateRouteTable

  # No-egress SG (belt-and-suspenders; no NAT/IGW route exists anyway).
  CompileNoEgressSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: No egress for the untrusted-code compile sandbox
      VpcId: !Ref CompileVpc
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 127.0.0.1/32
          Description: deny all egress (no internet route exists regardless)

  # ─── Compile Lambdas — one per MWCC version, in version order ───────────────
  # Each runs the SAME bootstrap + vendored set; its MWCC_VERSION env var selects
  # which mwcceppc.exe it runs (and gives it per-version AWS metrics). Routes:
  # /compile/mwcc/<token>/<action>. CompileFunction (GC 2.0) also owns the legacy
  # flat routes. Keep this list in sync with compiler/compilers.list.

  # GC MW 1.0 (2.3.3 build 144)
  CompileFnMwcc233144:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: compiler/
      Handler: bootstrap
      Runtime: provided.al2023
      Architectures:
        - x86_64
      Timeout: 30
      MemorySize: 2048
      EphemeralStorage:
        Size: 2048
      Environment:
        Variables:
          MWCC_VERSION: mwcc_233_144
      Policies:
        - AWSLambdaVPCAccessExecutionRole
      VpcConfig:
        SubnetIds:
          - !Ref CompileSubnetA
          - !Ref CompileSubnetB
        SecurityGroupIds:
          - !Ref CompileNoEgressSg
      Events:
        Health:
          Type: HttpApi
          Properties: { ApiId: !Ref HttpApi, Path: /compile/mwcc/233_144/health, Method: GET, Auth: { Authorizer: NONE } }
        Target:
          Type: HttpApi
          Properties: { ApiId: !Ref HttpApi, Path: /compile/mwcc/233_144/target, Method: POST, Auth: { Authorizer: NONE } }
        Check:
          Type: HttpApi
          Properties: { ApiId: !Ref HttpApi, Path: /compile/mwcc/233_144/check, Method: POST, Auth: { Authorizer: NONE } }
        Compile:
          Type: HttpApi
          Properties: { ApiId: !Ref HttpApi, Path: /compile/mwcc/233_144/compile, Method: POST, Auth: { Authorizer: NONE } }

  # GC MW 1.1 (2.3.3 build 159)
