Outputs:
  ApiUrl:
    Description: Public base URL of the serverless API.
    Value: !Sub "https://${DomainName}"
  CompileApiUrl:
    Description: >
      MWCC compile service on Lambda, behind the custom domain: flat /health,
      /target, /check, /compile and versioned /compile/mwcc/{version}/{action}.
    Value: !Sub "https://${DomainName}"
  HttpApiEndpoint:
    Description: Raw execute-api endpoint (before the custom domain).
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  UserPoolId:
    Value: !Ref UserPool
  UserPoolClientId:
    Value: !Ref UserPoolClient
  Region:
    Value: !Ref AWS::Region
