  # GC MW 2.0 (2.4.7 build 92) — default; also owns the legacy flat routes
  CompileFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: compiler/
      Handler: bootstrap
      Runtime: provided.al2023
      Architectures:
        - x86_64
      Timeout: 30
      # 2048 MB: headroom for warm-container RSS growth (recycle before an OOM kill
      # skips CleanupGuard mid-compile); Lambda also scales CPU with memory.
      MemorySize: 2048
      # 2048 MB /tmp for per-compile scratch dirs (compiler/src/compile.rs):
      # leftovers from hard-killed invocations fill the 512 MB default until writes
      # fail with ENOSPC.
      EphemeralStorage:
        Size: 2048
      Environment:
        Variables:
          MWCC_VERSION: mwcc_247_92
      # Pin to the no-egress VPC defined above: runs untrusted source, so even an
      # RCE can't call out. VpcConfig needs ENI perms, hence the VPC-access policy.
      Policies:
        - AWSLambdaVPCAccessExecutionRole
      VpcConfig:
        SubnetIds:
          - !Ref CompileSubnetA
          - !Ref CompileSubnetB
        SecurityGroupIds:
          - !Ref CompileNoEgressSg
      Events:
        Health:
          Type: HttpApi
          Properties: { ApiId: !Ref HttpApi, Path: /health, Method: GET, Auth: { Authorizer: NONE } }
        Target:
          Type: HttpApi
          Properties: { ApiId: !Ref HttpApi, Path: /target, Method: POST, Auth: { Authorizer: NONE } }
        Check:
          Type: HttpApi
          Properties: { ApiId: !Ref HttpApi, Path: /check, Method: POST, Auth: { Authorizer: NONE } }
        # Free-form playground compile (no lesson/symbol). Public, throttled above.
        Compile:
          Type: HttpApi
          Properties: { ApiId: !Ref HttpApi, Path: /compile, Method: POST, Auth: { Authorizer: NONE } }
        # GC/2.0's versioned routes (token 247_92). The flat routes above stay live
        # so the current frontend keeps working; the frontend migrates per-lesson.
        VersionedHealth:
          Type: HttpApi
          Properties: { ApiId: !Ref HttpApi, Path: /compile/mwcc/247_92/health, Method: GET, Auth: { Authorizer: NONE } }
        VersionedTarget:
          Type: HttpApi
          Properties: { ApiId: !Ref HttpApi, Path: /compile/mwcc/247_92/target, Method: POST, Auth: { Authorizer: NONE } }
        VersionedCheck:
          Type: HttpApi
          Properties: { ApiId: !Ref HttpApi, Path: /compile/mwcc/247_92/check, Method: POST, Auth: { Authorizer: NONE } }
        VersionedCompile:
          Type: HttpApi
          Properties: { ApiId: !Ref HttpApi, Path: /compile/mwcc/247_92/compile, Method: POST, Auth: { Authorizer: NONE } }

